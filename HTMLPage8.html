<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horas - إعدادات الحساب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #f8fafc;
        }

        .settings-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

            .header h2 {
                font-size: 24px;
                color: #fff;
                font-weight: 700;
            }

        /* قسم البروفايل والصورة */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .avatar-container {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #3b82f6;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

            .avatar-container img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

        .user-type-badge {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        /* خانات العرض التوضيحية */
        .info-group {
            margin-bottom: 18px;
        }

            .info-group label {
                display: block;
                margin-bottom: 8px;
                font-size: 14px;
                color: #94a3b8;
            }

        .info-box {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            text-align: right;
        }

        /* منطقة الأزرار */
        .actions-group {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }

            .btn-primary:hover {
                background: #2563eb;
            }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

            .btn-danger:hover {
                background: #ef4444;
                color: #fff;
                box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
            }
    </style>
</head>
<body>

    <div class="settings-card">
        <div class="header">
            <h2>إعدادات الحساب</h2>
        </div>

        <!-- قسم صورة المستخدم واسمه السريع -->
        <div class="profile-section">
            <div class="avatar-container">
                <!-- صورة افتراضية رمادية ستتغير تلقائياً بصورة جوجل لو سجل بجوجل -->
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=0f172a&color=fff" alt="Avatar">
            </div>
            <span id="userBadge" class="user-type-badge">جاري التحقق...</span>
        </div>

        <!-- خانات بيانات المستخدم (عرض فقط لحمايتها) -->
        <div class="info-group">
            <label>اسم المستخدم</label>
            <div id="usernameDisplay" class="info-box">جاري التحميل...</div>
        </div>

        <div class="info-group">
            <label>البريد الإلكتروني / الهوية</label>
            <div id="emailDisplay" class="info-box">جاري التحميل...</div>
        </div>

        <!-- أزرار التحكم -->
        <div class="actions-group">
            <button id="backToHomeBtn" class="btn btn-primary">⬅️ العودة للرئيسية</button>
            <button id="logoutBtn" class="btn btn-danger">🚪 تسجيل الخروج</button>
        </div>
    </div>

    <!-- ربط كود الجافا سكريبت الخاص بالإعدادات -->
    <script type="module" src="settings.js"></script>
</body>
</html>
